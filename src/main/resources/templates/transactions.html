<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kakeibo - Transactions</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header class="header">
        <div class="container nav-bar">
            <a href="/" class="logo">
                <i class="fas fa-wallet"></i>
                <span>Kakeibo</span>
            </a>
            <nav class="nav-links">
                <a href="/dashboard" class="nav-link">Dashboard</a>
                <a href="/budgets" class="nav-link">Budgets</a>
                <a href="/transactions" class="nav-link active">Transactions</a>
            </nav>
        </div>
    </header>
    
    <main class="main-content">
        <div class="container">
            <h1 class="page-title">Transactions</h1>
            
            <div class="card">
                <div class="budget-summary">
                    <h2 class="card-title">Add New Transaction</h2>
                    <a href="/transactions/new" class="btn btn-primary">Add Transaction</a>
                </div>
                
                <!-- This form should be handled by transaction-form.html through proper controller -->
            </div>
            
            <div class="card">
                <h2 class="card-title">Recent Transactions</h2>
                <table class="table">
                    <thead>
                        <tr>
                            <th>Description</th>
                            <th>Date</th>
                            <th>Category</th>
                            <th>Amount</th>
                            <th>Type</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${transactions == null || transactions.empty}">
                            <td colspan="6" style="text-align: center;">No transactions found</td>
                        </tr>
                        <tr th:if="${transactions != null && !transactions.empty}" th:each="transaction : ${transactions}">
                            <td th:text="${transaction.description}">-</td>
                            <td th:text="${#temporals.format(transaction.date, 'yyyy-MM-dd')}">-</td>
                            <td th:text="${transaction.category}">-</td>
                            <td th:class="${transaction.type == 'INCOME' ? 'positive' : 'negative'}">
                                <span th:if="${transaction.type == 'INCOME'}">+</span>
                                <span th:text="${transaction.amount}">-</span>
                            </td>
                            <td th:text="${transaction.type}">-</td>
                            <td>
                                <a th:href="@{/transactions/{id}/edit(id=${transaction.id})}" class="btn btn-sm btn-secondary">Edit</a>
                                <a th:href="@{/transactions/{id}/delete(id=${transaction.id})}" class="btn btn-sm btn-danger" 
                                   onclick="return confirm('Are you sure you want to delete this transaction?')">Delete</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
    
    <footer class="footer">
        <div class="container">
            <p>Kakeibo - The Japanese Art of Mindful Saving & Budgeting</p>
            <p>© 2026 Eugene Bell</p>
        </div>
    </footer>
</body>
</html>
