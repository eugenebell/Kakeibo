<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<th:block th:replace="layout :: layout(title='Transactions', content='transactions-content')">
</th:block>
<body>
    <div class="container">
        <h1 class="page-title">Transactions</h1>
        
        <div class="card">
            <div class="budget-summary">
                <h2 class="card-title">Add New Transaction</h2>
                <button class="btn btn-primary">Add Transaction</button>
            </div>
            <form class="form-group">
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Description</label>
                        <input type="text" class="form-control" placeholder="Transaction description">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Amount</label>
                        <input type="number" class="form-control" placeholder="0.00">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Type</label>
                        <select class="form-control">
                            <option value="INCOME">Income</option>
                            <option value="EXPENSE">Expense</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Category</label>
                        <select class="form-control">
                            <option>Food & Dining</option>
                            <option>Housing</option>
                            <option>Transportation</option>
                            <option>Entertainment</option>
                            <option>Utilities</option>
                            <option>Healthcare</option>
                            <option>Education</option>
                            <option>Personal Care</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Date</label>
                        <input type="date" class="form-control">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Budget</label>
                        <select class="form-control">
                            <option value="">No Budget</option>
                            <option>Groceries</option>
                            <option>Rent</option>
                            <option>Entertainment</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Recurring</label>
                    <input type="checkbox"> Mark as recurring
                </div>
                <button type="submit" class="btn btn-primary">Save Transaction</button>
            </form>
        </div>
        
        <div class="card">
            <h2 class="card-title">Recent Transactions</h2>
            <table class="table">
                <thead>
                    <tr>
                        <th>Description</th>
                        <th>Date</th>
                        <th>Category</th>
                        <th>Amount</th>
                        <th>Type</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Salary</td>
                        <td>2026-05-01</td>
                        <td>Income</td>
                        <td class="positive">+5000.00</td>
                        <td>Income</td>
                    </tr>
                    <tr>
                        <td>Grocery Shopping</td>
                        <td>2026-05-03</td>
                        <td>Food & Dining</td>
                        <td class="negative">-150.75</td>
                        <td>Expense</td>
                    </tr>
                    <tr>
                        <td>Rent</td>
                        <td>2026-05-05</td>
                        <td>Housing</td>
                        <td class="negative">-1200.00</td>
                        <td>Expense</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
