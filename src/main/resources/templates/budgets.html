<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kakeibo - Budgets</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header class="header">
        <div class="container nav-bar">
            <a href="/" class="logo">
                <i class="fas fa-wallet"></i>
                <span>Kakeibo</span>
            </a>
            <nav class="nav-links">
                <a href="/dashboard" class="nav-link">Dashboard</a>
                <a href="/budgets" class="nav-link active">Budgets</a>
                <a href="/transactions" class="nav-link">Transactions</a>
            </nav>
        </div>
    </header>
    
    <main class="main-content">
        <div class="container">
            <h1 class="page-title">Budgets</h1>
            
            <div class="card">
                <div class="budget-summary">
                    <h2 class="card-title">Create New Budget</h2>
                    <a href="/budgets/new" class="btn btn-primary">Add Budget</a>
                </div>
                <!-- This form should be handled by budget-form.html through proper controller -->
            </div>
            
            <div class="card">
                <h2 class="card-title">Current Budgets</h2>
                <table class="table">
                    <thead>
                        <tr>
                            <th>Budget Name</th>
                            <th>Category</th>
                            <th>Amount</th>
                            <th>Spent</th>
                            <th>Remaining</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${budgets == null || budgets.empty}">
                            <td colspan="7" style="text-align: center;">No budgets found</td>
                        </tr>
                        <tr th:if="${budgets != null && !budgets.empty}" th:each="budget : ${budgets}">
                            <td th:text="${budget.name}">-</td>
                            <td th:text="${budget.category}">-</td>
                            <td th:text="${budget.amount}">-</td>
                            <td>0.00</td>
                            <td th:text="${budget.amount}">-</td>
                            <td><span class="positive" th:if="${budget.active}">Active</span><span class="negative" th:if="${!budget.active}">Inactive</span></td>
                            <td>
                                <a th:href="@{/budgets/{id}/edit(id=${budget.id})}" class="btn btn-sm btn-secondary">Edit</a>
                                <a th:href="@{/budgets/{id}/delete(id=${budget.id})}" class="btn btn-sm btn-danger" 
                                   onclick="return confirm('Are you sure you want to delete this budget?')">Delete</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
    
    <footer class="footer">
        <div class="container">
            <p>Kakeibo - The Japanese Art of Mindful Saving & Budgeting</p>
            <p>© 2026 Eugene Bell</p>
        </div>
    </footer>
</body>
</html>
