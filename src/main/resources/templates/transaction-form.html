<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kakeibo - Transaction Form</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header class="header">
        <div class="container nav-bar">
            <a href="/" class="logo">
                <i class="fas fa-wallet"></i>
                <span>Kakeibo</span>
            </a>
            <nav class="nav-links">
                <a href="/dashboard" class="nav-link">Dashboard</a>
                <a href="/budgets" class="nav-link">Budgets</a>
                <a href="/transactions" class="nav-link active">Transactions</a>
            </nav>
        </div>
    </header>
    
    <main class="main-content">
        <div class="container">
            <h1 class="page-title" th:text="${transaction.id != null ? 'Edit Transaction' : 'Create New Transaction'}"></h1>
            
            <div class="card">
                <form th:object="${transaction}" th:action="@{/transactions}" method="post">
                    <input type="hidden" th:field="*{id}"/>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Description</label>
                            <input type="text" class="form-control" th:field="*{description}" placeholder="Transaction description">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Amount</label>
                            <input type="number" class="form-control" th:field="*{amount}" placeholder="0.00">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Type</label>
                            <select class="form-control" th:field="*{type}">
                                <option value="INCOME">Income</option>
                                <option value="EXPENSE">Expense</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Category</label>
                            <select class="form-control" th:field="*{category}">
                                <option value="Food & Dining">Food & Dining</option>
                                <option value="Housing">Housing</option>
                                <option value="Transportation">Transportation</option>
                                <option value="Entertainment">Entertainment</option>
                                <option value="Utilities">Utilities</option>
                                <option value="Healthcare">Healthcare</option>
                                <option value="Education">Education</option>
                                <option value="Personal Care">Personal Care</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Date</label>
                            <input type="date" class="form-control" th:field="*{date}">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Budget</label>
                            <select class="form-control" th:field="*{budgetId}">
                                <option value="">No Budget</option>
                                <!-- Budget options would be populated from the database -->
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">
                            <input type="checkbox" th:field="*{recurring}"> Mark as recurring
                        </label>
                    </div>
                    
                    <div class="form-group">
                        <button type="submit" class="btn btn-primary">Save Transaction</button>
                        <a href="/transactions" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </main>
    
    <footer class="footer">
        <div class="container">
            <p>Kakeibo - The Japanese Art of Mindful Saving & Budgeting</p>
            <p>© 2026 Eugene Bell</p>
        </div>
    </footer>
</body>
</html>
